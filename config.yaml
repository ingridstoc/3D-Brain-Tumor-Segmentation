root: "brats_full"
modality: "multimodal_4ch"
num_classes: 4
batch_size: 1 # era 2 cand foloseam cropuri
num_workers: 8
epochs: 35
seed: 42
include_bg_in_metric: false
device: "auto"
run_name: "multimodal_4ch_full"

model:
  name: "segresnet"   # unet | segresnet | unetr | dynunet

  unet:
    in_channels: 4
    channels: [16, 32, 64, 128, 256]
    strides: [2, 2, 2, 2]
    num_res_units: 2
    norm: "INSTANCE"

  segresnet:
    in_channels: 4
    init_filters: 8
    dropout_prob: 0.2
    blocks_down: [1, 2, 2, 4]
    blocks_up: [1, 1, 1]

  unetr:
    in_channels: 4
    img_size: [240, 240, 160]   # set this to your padded volume size
    feature_size: 16
    hidden_size: 768
    mlp_dim: 3072
    num_heads: 12
    proj_type: "conv"
    norm_name: "instance"
    res_block: true
    dropout_rate: 0.0

  dynunet:
    in_channels: 4
    kernel_size: [[3,3,3],[3,3,3],[3,3,3],[3,3,3],[3,3,3]]
    strides: [[1,1,1],[2,2,2],[2,2,2],[2,2,2],[2,2,2]]
    upsample_kernel_size: [[2,2,2],[2,2,2],[2,2,2],[2,2,2]]
    filters: [32, 64, 128, 256, 320]
    dropout: 0.0
    deep_supervision: false
    deep_supr_num: 1
    res_block: true

metrics:
  compute_hd95: true
  hd95_percentile: 95
  compute_iou: true
  compute_sensitivity: true
  compute_specificity: true
  eval_on_train: false   # keep false; train metrics stay Dice-only

augmentations:
  name: "mixed4"

optimizer:
  name: adamw
  adamw:
    lr: 0.0003
    weight_decay: 0.0001

  adam:
    lr: 0.0003
    weight_decay: 0.0001

  rmsprop:
    lr: 0.0003
    momentum: 0.9
    weight_decay: 0.0001
  
  sgd:
    lr: 0.0003
    momentum: 0.9
    weight_decay: 0.0001

scheduler:
  name: reduce_on_plateau
  reduce_on_plateau:
    mode: min
    factor: 0.5
    patience: 3
    threshold: 0.0001
    min_lr: 0.000001

  cosine:
    T_max: 35
    eta_min: 0.000001

  cosine_warm_restarts:
    T_0: 10
    T_mult: 2
    eta_min: 0.000001

  none: {}

loss:
  name: dice_focal
  dice_ce:
    lambda_dice: 1.0
    lambda_ce: 1.0
    to_onehot_y: true
    softmax: true
    gamma: 2.0
    focal_weight: null

  dice_focal:
    lambda_dice: 1.0
    lambda_focal: 1.0
    to_onehot_y: true
    softmax: true
    gamma: 2.0

  generalized_dice_ce:
    lambda_gdice: 1.0
    lambda_ce: 1.0
    to_onehot_y: true
    softmax: true

  none: {}